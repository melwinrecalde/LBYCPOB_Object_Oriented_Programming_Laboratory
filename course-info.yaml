title: LBYCPOB Object Oriented Programming Laboratory
language: English
summary: "Object Oriented Programming (OOP) Laboratory Coding Tasks is a repository\
  \ that provides the coding activities in LBYCPOB (Object Oriented Programming Laboratory).\
  \ This course introduces OOP concepts and techniques using the Java platform. Topics\
  \ primarily include classes and objects, abstraction, encapsulation, inheritance,\
  \ and polymorphism. Students will also learn to utilize basic Unified Modeling Language\
  \ (UML) diagrams, implement testing and debugging techniques, handle exceptions\
  \ and events, and building simple graphical user interfaces (GUIs). The course emphasizes\
  \ practical application aligned with modern software engineering practices."
programming_language: Java
